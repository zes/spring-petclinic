name: Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: get java version
        id: get_java_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set lower case owner name
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with Spring Boot Buildpacks
        run: |
          ./mvnw -DskipTests \
            -Dspring-boot.build-image.imageName=spring-petclinic:${{ steps.get_java_version.outputs.version }} \
            spring-boot:build-image

      - name: Tag and push image to GHCR
        run: |
          docker tag spring-petclinic:${{ steps.get_java_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:${{ steps.get_java_version.outputs.version }}
          docker tag spring-petclinic:${{ steps.get_java_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:${{ github.sha }}
          docker tag spring-petclinic:${{ steps.get_java_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:latest

          docker push ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:${{ steps.get_java_version.outputs.version }}
          docker push ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:latest
